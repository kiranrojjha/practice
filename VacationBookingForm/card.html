<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>upiDetails</title>
    <style>

body{
    font-family: Arial, sans-serif;
    background: #f4f7fc;
    margin: 0;
    padding: 40px;
}

form{
    width: 400px;
    margin: auto;
}

fieldset{
    border: 2px solid #3498db;
    border-radius: 12px;
    padding: 25px;
    background-color: white;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

legend{
    font-size: 24px;
    font-weight: bold;
    color: #3498db;
    padding: 0 10px;
}

div{
    margin-bottom: 15px;
}

label{
    display: block;
    font-weight: bold;
    margin-bottom: 5px;
}

input[type="text"],
input[type="password"],
input[type="date"],
input[type="number"],
select{
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
}

button{
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background-color: #3498db;
    cursor: pointer;
}

button:hover{
    background-color: #2980b9;
}

button a{
    color: white;
    text-decoration: none;
    font-size: 16px;
    font-weight: bold;
}

</style>
</head>

<body>
    <form>
    <fieldset>
        <legend>Payment Details</legend>
        <div>
            <label for="bank">Select Bank</label>
            <select id="bank">
                <option disabled selected>Select Bank</option>
                <option>SBI</option>
                <option>HDFC</option>
                <option>ICICI</option>
                <option>PNB</option>
                <option>Axis Bank</option>
            </select>
        </div>

        <div>
            <label for="cardname">Card Holder Name</label>
            <input type="text" id="cardname" placeholder="Enter Card Holder Name" required>
        </div>
        <br>

        <div>
            <label for="cardnumber">Card Number</label>
            <input type="text" id="cardnumber" maxlength="16" placeholder="1234 5678 9012 3456" required>
        </div>
        <br>

        <div>
            <label for="expiry">Expiry Date</label>
            <input type="date" id="expiry" required>
        </div>
        <br>

        <div>
            <label for="cvv">CVV</label>
            <input type="password" id="cvv" maxlength="3" placeholder="***" required>
        </div>
        <br>
        <br>
        <div>
            <label for="amount">Amount Payable (₹)</label>
            <input type="number" id="amount" placeholder="Enter Amount" required>
        </div>
        <br>
        <button type="submit" value="Book Vacation"><a href="billing.html" target="_self">PROCEED</a></button>


        </div>
        </fieldset>
        </form>
</body>

</html>
