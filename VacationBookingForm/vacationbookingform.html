<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacation-booking-site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fc;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        form {
            max-width: 900px;
            margin: auto;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        fieldset {
            border: 2px solid #3498db;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        legend {
            font-size: 18px;
            font-weight: bold;
            color: #3498db;
            padding: 0 10px;
        }

        div {
            margin-bottom: 15px;
        }

        label {
            display: inline-block;
            width: 180px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            width: 60%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
        }

        input[type="radio"],
        input[type="checkbox"] {
            margin-right: 5px;
        }

        input[type="submit"],
        input[type="reset"] {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
            margin-right: 10px;
        }

        input[type="submit"] {
            background-color: #3498db;
            color: white;
        }

        input[type="submit"]:hover {
            background-color: #2980b9;
        }

        input[type="reset"] {
            background-color: #e74c3c;
            color: white;
        }

        input[type="reset"]:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>
    <h1>Vacation Booking Form</h1>
    <form action="/submit.php">
        <fieldset>
            <legend>Personal Information</legend>
            <div>
                <label for="name">Name</label>
                <input id="name" type="text" required placeholder="Enter name">
            </div>
            <div>
                <label for="ph">Phone</label>
                <input id="ph" type="tel" placeholder="Enter Phone" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="Enter Email" required>
            </div>
            <div>
                <label for="gender">Gender</label>
                <select id="gender" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div>
                <label for="dob">Date of Birth</label>
                <input id="dob" type="date" required>
            </div>
        </fieldset>
        <fieldset>
            <legend>Accommodation</legend>
            <div>
                <legend>Hotel type</legend>
                <input id="3 STAR " type="radio" name="HOTEL" value="2 STAR ">
                <label for="3 STAR ">3 STAR </label>

                <input id="4 STAR " type="radio" name="HOTEL" value="3 STAR ">
                <label for="4 STAR ">4 STAR</label>

                <input id="5 STAR " type="radio" name="HOTEL" value="5 STAR ">
                <label for="5 STAR ">5 STAR </label>

            </div>
            <div>
                <p>Room prefernce</p>
                <input id="Single " type="radio" name="room" value="Single ">
                <label for="Single ">Single </label>

                <input id="Double " type="radio" name="room" value="Double ">
                <label for="Double ">Double</label>

                <input id="Family " type="radio" name="room" value="Family ">
                <label for="Family ">Family </label>

            </div>
            <div>
                <label for="number">number of rooms</label>
                <input id="number" type="number" placeholder="Enter number of rooms" required>
            </div>
        </fieldset>
        <fieldset>
            <legend>Travel Details</legend>
            <label>Destination:</label>
            <input type="text" name="destination" placeholder="Enter destination">
            <br>

            <label>Departure City:</label>
            <input type="text" name="departure_city" placeholder=" Enter departure city name">
            <br>

            <label>Departure Date:</label>
            <input type="date" name="departure_date" placeholder=" Enter departure date">
            <br>

            <label>Return Date:</label>
            <input type="date" name="return_date" placeholder=" Enter return date">
            <br>

            <label>Number of Travelers:</label>
            <input type="number" name="travelers" min="1" placeholder=" Enter number of travellers">
            <br>

            <label>Travel Class:</label>
            <select name="travel_class" placeholder=" Enter travel class">
                <option disabled selected>Select Travel class </option>
                <option>Economy</option>
                <option>Business</option>
                <option>First Class</option>
            </select>
        </fieldset>
        <fieldset>
            <legend>Package Preferences</legend>
            <label>Transportation Required:</label><br>
            <input type="radio" name="transport" value="Yes"> Yes
            <input type="radio" name="transport" value="No"> No
            <br>

            <label>Meal Preference:</label><br>
            <input type="radio" name="meal" value="Veg"> Veg
            <input type="radio" name="meal" value="Non-Veg"> Non-Veg
            <br>

            <label>Tour Guide Required:</label><br>
            <input type="radio" name="guide" value="Yes"> Yes
            <input type="radio" name="guide" value="No"> No
            <br>

            <p>Adventure Activities:</p><br>

            <input id="trekking" type="checkbox" name="activity" value="Trekking">
            <label for="trekking">Trekking</label>

            <input id="scuba" type="checkbox" name="activity" value="Scuba Diving">
            <label for="scuba">Scuba Diving</label>

            <input id="paragliding" type="checkbox" name="activity" value="Paragliding">
            <label for="paragliding">Paragliding</label>

            <input id="safari" type="checkbox" name="activity" value="Safari">
            <label for="safari">Safari</label>
        </fieldset>
                         
         
     
        <legend>Confirmation</legend>

        <input type="checkbox" name="terms" required>
        I agree to the Terms and Conditions


        <br>
         

        <button type="submit" value="Book Vacation"><a href="payment.html" target="_self">PROCEED</a></button>
        <button type="reset" value="Reset Form">RESET</button>

    </form>


</body>

</html>
