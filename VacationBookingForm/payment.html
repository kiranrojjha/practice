    justify-content: center;
    align-items: center;
}

form{
    width: 400px;
    background: white;
    padding: 30px;

}

    display: block;
    font-size: 24px;
    font-weight: bold;
    color: #3498db;
    margin-bottom: 25px;
}

button{
    display: block;
    width: 100%;
    padding: 12px;
    margin: 15px 0;
    border: none;
    border-radius: 6px;
    background-color: #3498db;
    cursor: pointer;
}

button:hover{
    background-color: #2980b9;
}

button a{
    color: white;
    text-decoration: none;
    font-size: 16px;
    font-weight: bold;
    display: block;
